# Render service definition. Push this repo to a Git host (GitHub etc.),
# then in Render's dashboard: New > Blueprint > point at the repo.
#
# The app has no built-in auth — access control happens at the
# deployment layer (Render's own gate, Cloudflare Access, VPN, etc.).
services:
  - type: web
    name: listicle-to-instagram
    runtime: docker
    plan: starter # starter ($7/mo) keeps the container always-on; free tier sleeps after 15min idle
    region: oregon
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
